[package]
name = "ax-plat-riscv64-qemu-virt"
version = "0.5.2"
repository = "https://github.com/rcore-os/tgoskits"
description = "Implementation of `axplat` hardware abstraction layer for QEMU RISC-V virt board."
keywords = ["arceos", "os", "hal", "embedded", "riscv"]
categories = ["embedded", "no-std", "hardware-support", "os"]
edition = "2024"
authors = [
    "Yuekai Jia <equation618@gmail.com>",
    "Youjie Zheng <Azure_stars@126.com>",
    "yanjuguang <coolyanjg@163.com>",
    "Su Mingxian <aarkegz@gmail.com>",
    "RobertYuan <634954435@qq.com>",
    "hky1999 <keyang.hu@qq.com>",
]
license = "Apache-2.0"

[features]
fp-simd = ["ax-cpu/fp-simd"]
irq = ["ax-plat/irq", "dep:ax-riscv-plic"]
rtc = ["dep:riscv_goldfish"]
smp = ["ax-plat/smp"]

[dependencies]
ax-kspin = "0.3.2"
ax-lazyinit = "0.4.3"
log = "0.4"
ax-config-macros = "0.4.2"
ax-cpu = { workspace = true }
ax-plat = { workspace = true }

[target.'cfg(target_arch = "riscv64")'.dependencies]
riscv = "0.16"
riscv_goldfish = { version = "0.1", optional = true }
ax-riscv-plic = { version = "0.4.1", optional = true }
sbi-rt = { version = "0.0.3", features = ["legacy"] }
uart_16550 = "0.5.0"

[package.metadata.docs.rs]
targets = ["riscv64gc-unknown-none-elf"]
